services:

  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file:
      - .env
    volumes: 
      - "./backend:/app"
      - "uploads:/app/uploads"
    depends_on: 
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: 
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file:
      - .env
    volumes: 
      - "./backend:/app"
      - "uploads:/app/uploads"
    depends_on: 
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info -Q default,high_priority,genome_jobs,cleanup
    restart: unless-stopped

  flower:
    build: ./backend
    ports: ["5555:5555"]
    env_file:
      - .env
    depends_on: 
      - redis
      - worker
    command: celery -A app.worker.celery_app flower --port=5555
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tigr_tas}
      POSTGRES_USER: ${POSTGRES_USER:-tigr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
    volumes: 
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tigr_user} -d ${POSTGRES_DB:-tigr_tas}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-testpassword} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes: 
      - "redis_data:/data"
    healthcheck: 
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-testpassword} ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
